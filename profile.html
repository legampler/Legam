<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LEGAM | Digital Universe</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins', sans-serif;
    background:#000;
    color:white;
    overflow-x:hidden;
}

/* BACKGROUND GRADIENT */
body::before{
    content:"";
    position:fixed;
    width:200%;
    height:200%;
    background:linear-gradient(45deg,#ff9800,#ff0066,#00f0ff,#ff9800);
    background-size:400% 400%;
    animation:gradient 12s ease infinite;
    opacity:0.08;
    z-index:-2;
}

@keyframes gradient{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* ROBLOX AVATAR GERAK */
.avatar-bg{
    position:fixed;
    top:50%;
    left:50%;
    width:500px;
    transform:translate(-50%,-50%);
    opacity:0.15;
    z-index:-1;
    animation:
        float 4s ease-in-out infinite,
        rotate 25s linear infinite,
        glow 3s ease-in-out infinite;
}

@keyframes float{
    0%{ transform:translate(-50%,-50%) translateY(0px); }
    50%{ transform:translate(-50%,-50%) translateY(-30px); }
    100%{ transform:translate(-50%,-50%) translateY(0px); }
}

@keyframes rotate{
    0%{ transform:translate(-50%,-50%) rotate(0deg); }
    100%{ transform:translate(-50%,-50%) rotate(360deg); }
}

@keyframes glow{
    0%{ filter: drop-shadow(0 0 20px #ff9800); }
    50%{ filter: drop-shadow(0 0 60px #ff0066); }
    100%{ filter: drop-shadow(0 0 20px #ff9800); }
}

/* MAIN CARD */
.container{
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    padding:60px 20px;
}

.card{
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(25px);
    border-radius:30px;
    padding:45px;
    width:95%;
    max-width:450px;
    text-align:center;
    box-shadow:0 0 60px rgba(255,152,0,0.4);
}

.profile-img{
    width:150px;
    height:150px;
    border-radius:50%;
    object-fit:cover;
    border:5px solid #ff9800;
    box-shadow:0 0 40px #ff9800;
    transition:0.4s;
}

.profile-img:hover{
    transform:scale(1.1) rotate(5deg);
    box-shadow:0 0 80px #ff9800;
}

h1{
    font-family:'Orbitron', sans-serif;
    margin-top:20px;
    font-size:28px;
    letter-spacing:4px;
    text-shadow:0 0 20px #ff9800;
}

/* TYPING */
.typing{
    margin:15px 0 25px;
    font-size:14px;
    color:#ccc;
    border-right:2px solid #ff9800;
    white-space:nowrap;
    overflow:hidden;
    animation:typing 4s steps(40) infinite alternate,
               blink .8s infinite;
}

@keyframes typing{
    from{width:0}
    to{width:100%}
}

@keyframes blink{
    50%{border-color:transparent}
}

/* BUTTON */
.btn{
    display:block;
    margin:14px auto;
    padding:14px;
    border-radius:18px;
    text-decoration:none;
    font-weight:500;
    transition:0.3s;
    width:92%;
}

.instagram{
    background:linear-gradient(45deg,#f58529,#dd2a7b,#8134af,#515bd4);
    color:white;
}

.tiktok{
    background:#111;
    border:1px solid #fff;
    color:white;
}

.sociabuzz{
    background:#ff9800;
    color:white;
}

.btn:hover{
    transform:scale(1.07);
    box-shadow:0 0 30px rgba(255,255,255,0.4);
}

footer{
    margin-top:25px;
    font-size:12px;
    color:#888;
}

@media(max-width:600px){
    .avatar-bg{
        width:300px;
    }

    h1{
        font-size:22px;
    }

    .profile-img{
        width:120px;
        height:120px;
    }
}
</style>
</head>

<body>

<!-- AVATAR ROBLOX -->
<img src="avatar.png" class="avatar-bg" alt="Roblox Avatar">

<div class="container">
<div class="card">

<img src="foto.jpg" class="profile-img" alt="LEGAM">

<h1>LEGAM</h1>

<div class="typing">
Digital Creator • Roblox Vibes • Next Level Branding
</div>

<a href="https://www.instagram.com/rifkyrchmwn" target="_blank" class="btn instagram">
🔥 Instagram
</a>

🎵 TikTok
</a>

<a href="https://sociabuzz.com/remboww59" target="_blank" class="btn sociabuzz">
☕ Sociabuzz
</a>

<footer>
© 2026 LEGAM • Digital Universe
</footer>

</div>
</div>

</body>
</html>
